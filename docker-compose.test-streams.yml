# Test amaçlı 4 adet sahte RTSP kamera akışı.
# MediaMTX bir RTSP sunucusu olarak çalışır, 4 ffmpeg container'ı da
# lavfi test kaynaklarını (testsrc/testsrc2/smptebars/smptehdbars)
# bu sunucuya push eder.
#
# Kullanım:
#   docker compose -f docker-compose.test-streams.yml up -d
#   docker compose -f docker-compose.test-streams.yml down
#
# Yayınlar (host'tan erişim):
#   rtsp://localhost:8554/cam1
#   rtsp://localhost:8554/cam2
#   rtsp://localhost:8554/cam3
#   rtsp://localhost:8554/cam4
#   (tarayıcıdan hızlı bakmak için HLS: http://localhost:8888/cam1/index.m3u8)

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: test_rtsp_server
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
    restart: unless-stopped

  cam1:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    container_name: test_cam1
    depends_on:
      - mediamtx
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "sleep 2 && ffmpeg -re
      -f lavfi -i testsrc=size=1280x720:rate=25
      -f lavfi -i sine=frequency=440:sample_rate=44100
      -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p
      -c:a aac
      -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/cam1"

  cam2:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    container_name: test_cam2
    depends_on:
      - mediamtx
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "sleep 2 && ffmpeg -re
      -f lavfi -i testsrc2=size=1280x720:rate=25
      -f lavfi -i sine=frequency=880:sample_rate=44100
      -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p
      -c:a aac
      -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/cam2"

  cam3:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    container_name: test_cam3
    depends_on:
      - mediamtx
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "sleep 2 && ffmpeg -re
      -f lavfi -i smptebars=size=1280x720:rate=25
      -f lavfi -i sine=frequency=1320:sample_rate=44100
      -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p
      -c:a aac
      -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/cam3"

  cam4:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    container_name: test_cam4
    depends_on:
      - mediamtx
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "sleep 2 && ffmpeg -re
      -f lavfi -i smptehdbars=size=1280x720:rate=25
      -f lavfi -i sine=frequency=1760:sample_rate=44100
      -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p
      -c:a aac
      -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/cam4"
